project:
  name: "PROFLAUNDRY"
  title: "ProfLaundry — Профессиональная прачечная"
  description: "Система управления заказами профессиональной прачечной"
  version: "1.0.0"

stack:
  backend: ""
  database: ""
  frontend: ""

pages:
  - id: overview
    title: "Обзор проекта"
    file: docs/index.md
    locked: true

  - id: business
    title: "Бизнес-процесс"
    file: docs/business/index.md
    children:
      - id: business.statements
        title: "Утверждения"
        file: docs/business/statements.md

  - id: models
    title: "Модели Django"
    file: docs/models/index.md

  - id: architecture
    title: "Архитектура"
    file: docs/architecture/index.md

  - id: ui
    title: "Интерфейс"
    file: docs/ui/index.md

docs_settings:
  changes_dir: "docs/_changes"
  attachments_dir: "docs/_attachments"
  main_branch: "main"
  develop_branches:
    - "^develop$"
  feature_branches:
    - "^feature/"
